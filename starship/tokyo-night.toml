palette = "tokyonight"

format = """
[‚ĖĎ‚Ėí‚Ėď](fg:blue)\
$username\
[Óāī](bg:bg_highlight fg:blue)\
$directory\
[Óāī](fg:bg_highlight bg:blue_dim)\
$git_branch\
$git_status\
[Óāī](fg:blue_dim bg:bg_dark)\
$nodejs\
$rust\
$golang\
$php\
[Óāī](fg:bg_dark)\
\n$character"""

[palettes.tokyonight]
blue = '#7aa2f7'
bg_highlight = '#3b4261'
blue_dim = '#24283b'
bg_dark = '#1f2335'
bg_black = '#16161e'
fg_light = '#c0caf5'
fg_dark = '#010101'

[username]
show_always = true
style_user = "bg:blue fg:fg_dark"
style_root = "bg:blue fg:fg_dark"
format = "[ $user ]($style)"

[directory]
style = "bg:bg_highlight fg:fg_light"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ÔÄĀ "
"Pictures" = "ÔÄĺ "

[git_branch]
symbol = "Ôźė"
style = "bg:blue_dim fg:blue"
format = "[ $symbol $branch ]($style)"

[git_status]
style = "bg:blue_dim fg:blue"
format = "[($all_status$ahead_behind )]($style)"

[nodejs]
symbol = "Óúė"
style = "bg:bg_dark fg:blue"
format = "[ $symbol ($version) ]($style)"

[rust]
symbol = "Óě®"
style = "bg:bg_dark fg:blue"
format = "[ $symbol ($version) ]($style)"

[golang]
symbol = "Óėß"
style = "bg:bg_dark fg:blue"
format = "[ $symbol ($version) ]($style)"

[php]
symbol = "Óėą"
style = "bg:bg_dark fg:blue"
format = "[ $symbol ($version) ]($style)"

[character]
success_symbol = "[ÓöĎ](bold fg:blue)"
error_symbol = "[ÓöĎ](bold fg:red)"
